<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MMJ生日快乐 | HAPPY BIRTHDAY</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden !important;
      position: fixed;
      top: 0;
      left: 0;
      will-change: transform;
      perspective: 1000px;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      box-sizing: border-box;
      background: #000;
      cursor: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTYiIGhlaWdodD0iMTYiIHZpZXdCb3g9IjAgMCAxNiAxNiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSI4IiBjeT0iOCIgcj0iOCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmY5OWNjIiBzdHJva2Utd2lkdGg9IjIiLz48L3N2Zz4='), auto;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      border: none !important;
      outline: none !important;
    }

    #cursorTrail {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999998;
      mix-blend-mode: screen;
      opacity: 1;
    }

    .intro-page {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0828, #2d1045, #1f0a30);
      z-index: 9999;
      transition: all 1s ease;
      background-image:
              radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 2%),
              radial-gradient(circle at 90% 80%, rgba(255, 100, 180, 0.15) 0%, transparent 2%),
              radial-gradient(circle at 50% 50%, rgba(140, 82, 255, 0.08) 0%, transparent 40%);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #intro-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      background: transparent;
    }

    .intro-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 15px;
      margin-top: env(safe-area-inset-top);
      white-space: nowrap;
      width: 100%;
      max-width: 100%;
    }

    .intro-page h1 {
      will-change: transform, background-position;
      transform: translateZ(0);
      backface-visibility: hidden;
      font-size: clamp(2rem, 9vw, 4.5rem);
      margin-bottom: 20px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #ff99cc, #ffccff, #b388ff, #c792ea, #ff99cc);
      background-size: 300% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      color: #fff;
      text-shadow:
              0 0 10px rgba(255, 255, 255, 0.9),
              0 0 15px rgba(255, 102, 196, 0.7),
              1px 1px 2px #000;
      -webkit-text-stroke: 1px rgba(0, 0, 0, 0.3);
      animation: titleAnim 6s ease-in-out infinite alternate;
      white-space: nowrap;
      width: 100%;
      overflow: visible;
    }

    @keyframes titleAnim {
      0% { transform: translateY(0px) translateZ(0); background-position: 0%; }
      100% { transform: translateY(-15px) translateZ(0); background-position: 100%; }
    }

    .intro-page p {
      font-size: clamp(1rem, 4vw, 1.6rem);
      margin-bottom: 40px;
      color: #ffffff;
      text-shadow:
              0 0 10px #fff,
              0 0 20px rgba(140, 82, 255, 0.8),
              1px 1px 3px #000;
      animation: textTwinkle 3s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes textTwinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
    }

    .enter-btn {
      padding: 15px 45px;
      background: linear-gradient(90deg, #ff66c4, #8c52ff);
      border-radius: 60px;
      color: #fff;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      font-weight: bold;
      box-shadow: 0 0 25px rgba(255, 102, 196, 0.9), inset 0 2px 4px rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: 0.4s;
      position: relative;
      overflow: hidden;
      animation: btnBreath 3s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes btnBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes btnShake {
      0%, 100% { transform: scale(1.15) rotate(0deg); }
      25% { transform: scale(1.15) rotate(-2deg); }
      75% { transform: scale(1.15) rotate(2deg); }
    }

    .enter-btn:active { animation: btnShake 0.3s ease-in-out; }

    .enter-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .enter-btn:active::after { width: 300px; height: 300px; opacity: 0; }

    .enter-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 40px #ff66c4, 0 0 60px #8c52ff, inset 0 2px 4px rgba(255, 255, 255, 0.6);
    }

    .intro-page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.2);
    }

    .main-page {
      opacity: 0;
      pointer-events: none;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background: #000;
      overflow: hidden !important;
      transition: opacity 0.8s ease-out;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .main-page.show {
      opacity: 1;
      pointer-events: auto;
    }

    #fireworks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      background: #000;
    }

    .photos-container {
      position: absolute;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      width: calc(100% - env(safe-area-inset-left) - env(safe-area-inset-right));
      height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      z-index: 10;
      pointer-events: auto;
      transform-style: preserve-3d;
    }

    .photos-container.has-active-card {
      opacity: 0.1 !important;
      pointer-events: none !important;
      filter: blur(2px);
    }

    .photo-card {
      position: absolute;
      overflow: hidden;
      opacity: 0.95;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow:
              0 10px 25px rgba(0, 0, 0, 0.5),
              0 0 15px rgba(255, 102, 196, 0.2),
              inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      user-select: none;
      z-index: 20;
      touch-action: none;
      min-width: 100px;
      min-height: 120px;
      cursor: pointer;
    }

    .photo-card:hover {
      opacity: 1 !important;
      transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1.2) !important;
      box-shadow:
              0 20px 40px rgba(255, 102, 196, 0.6),
              0 0 50px rgba(140, 82, 255, 0.5),
              inset 0 0 15px rgba(255, 255, 255, 0.3),
              0 0 80px rgba(255, 102, 196, 0.4);
      z-index: 999 !important;
      filter: brightness(1.1) contrast(1.05);
    }

    .photo-viewer {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 999999 !important;
      background-color: rgba(0, 0, 0, 0.95) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .photo-viewer.active {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-viewer-img {
      max-width: 90vw !important;
      max-height: 80vh !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
      border-radius: 15px;
      box-shadow:
              0 0 100px rgba(255, 102, 196, 0.8),
              0 0 150px rgba(140, 82, 255, 0.6),
              inset 0 0 30px rgba(255, 255, 255, 0.5);
    }

    .photo-card.shape-1 { clip-path: polygon(10% 0, 100% 15%, 90% 100%, 0 85%); }
    .photo-card.shape-2 { clip-path: polygon(0 10%, 90% 0, 100% 90%, 10% 100%); }
    .photo-card.shape-3 { border-radius: 60% 40% 70% 30% / 30% 50% 50% 70%; }
    .photo-card.shape-4 { clip-path: polygon(20% 0, 100% 20%, 80% 100%, 0 80%); }
    .photo-card.shape-5 { border-radius: 12px 80px 20px 60px; }
    .photo-card.shape-6 { clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 20% 100%, 0 80%); }

    .photo-img {
      width: 100%;
      height: 100%;
      object-fit: cover !important;
      pointer-events: none;
      border-radius: 12px;
    }

    .flash-effect {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      animation: flash 0.8s ease-out forwards;
    }

    @keyframes flash {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(2); }
    }

    .footer-message {
      position: absolute;
      bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(0.9rem, 2.8vw, 1.2rem);
      font-weight: bold;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ff99cc 0%, #b388ff 50%, #ffccff 100%);
      background-size: 400% 400%;
      background-clip: text;
      -webkit-background-clip: text;
      color: #fff;
      text-shadow:
              1px 1px 2px #000,
              0 0 8px rgba(255, 255, 255, 0.9),
              0 0 15px rgba(255, 102, 196, 0.7);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 30px;
      z-index: 100;
      animation:
              footerFloat 5s ease-in-out infinite alternate,
              footerGradient 8s ease infinite;
      transition: opacity 0.5s ease, transform 0.5s ease;
      white-space: nowrap;
    }

    @keyframes footerGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes footerFloat {
      0% { transform: translateX(-50%) translateY(0px); }
      100% { transform: translateX(-50%) translateY(-8px); }
    }

    .footer-message.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }

    .random-wish {
      position: fixed !important;
      bottom: calc(80px + env(safe-area-inset-bottom)) !important;
      left: 50% !important;
      transform: translate(-50%, 0) !important;
      text-align: center !important;
      font-size: clamp(1.2rem, 4.5vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(120deg, #ff99cc, #ffccff, #b388ff, #c792ea, #ff99cc);
      background-size: 400% 400%;
      background-clip: text;
      -webkit-background-clip: text;
      color: #fff;
      text-shadow: 2px 2px 4px #000, 0 0 10px #fff, 0 0 20px rgba(255,102,196,0.8), 0 0 35px rgba(140,82,255,0.6);
      z-index: 1000000 !important;
      opacity: 0;
      max-width: 90%;
      white-space: nowrap;
      cursor: pointer;
    }

    @keyframes wishShow {
      0% { opacity: 0; transform: translate(-50%, 20px) scale(0.9); }
      70% { opacity: 1; transform: translate(-50%, 0) scale(1.05); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    .random-wish.active {
      animation: wishShow 0.5s ease-out forwards, wishGradient 6s ease infinite;
    }

    @keyframes wishGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 768px) {
      .photo-viewer-img { max-width: 95vw !important; max-height: 75vh !important; }
      .random-wish { font-size: clamp(1.1rem, 4vw, 1.8rem) !important; }
      .photo-card { min-width: 80px; min-height: 100px; }
    }

    @media (max-width: 480px) {
      .photo-card:hover { transform: scale(1.15) !important; }
      .random-wish { font-size: clamp(1rem, 3.8vw, 1.6rem) !important; }
      .photo-card { min-width: 70px; min-height: 90px; }
    }
  </style>
</head>

<body>
<canvas id="cursorTrail"></canvas>
<div class="intro-page">
  <canvas id="intro-stars"></canvas>
  <div class="intro-content">
    <h1>🎂 MMJ生日快乐 🎂</h1>
    <p>许个愿望吧</p>
    <button class="enter-btn" onclick="openMain()">吹灭蜡烛开启🎂 →</button>
  </div>
</div>

<div class="main-page">
  <canvas id="fireworks"></canvas>
  <div class="photos-container" id="photosContainer"></div>
  <div class="photo-viewer" id="photoViewer" onclick="closePhotoViewer()">
    <img src="" alt="放大照片" class="photo-viewer-img" id="photoViewerImg">
  </div>
  <div id="wishContainer"></div>
  <p class="footer-message" id="footerMessage">✨点击图片抽取愿望盲盒✨</p>
</div>

<script>
  const photoSources = [
    "images/1.jpg","images/2.jpg","images/3.jpg","images/4.jpg","images/5.jpg",
    "images/6.jpg","images/7.jpg","images/8.jpg","images/9.jpg","images/10.jpg"
  ];

  const birthdayWishes = [
    "谢谢光临","谢谢光临","再来一次","谢谢光临","网站访问权5min",
    "谢谢光临","一个愿望","再来一次","谢谢光临","谢谢光临"
  ];

  let currentWishElement = null;
  let wishAnimationTimer = null;
  let particles = [];
  const footerMessage = document.getElementById('footerMessage');
  const photosContainer = document.getElementById('photosContainer');
  const photoViewer = document.getElementById('photoViewer');
  const photoViewerImg = document.getElementById('photoViewerImg');

  function getSafeAreaInset(side) {
    try { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(`env(safe-area-inset-${side})`) || 0); }
    catch (e) { return 0; }
  }

  function clearAllWishes() {
    if (wishAnimationTimer) clearTimeout(wishAnimationTimer);
    wishAnimationTimer = null;
    document.getElementById('wishContainer').innerHTML = '';
    currentWishElement = null;
  }

  function getRandomWish() {
    return birthdayWishes[Math.floor(Math.random() * birthdayWishes.length)];
  }

  function showRandomWish() {
    clearAllWishes();
    const el = document.createElement('div');
    el.className = 'random-wish';
    el.textContent = getRandomWish();
    el.onclick = () => showRandomWish();
    document.getElementById('wishContainer').appendChild(el);
    currentWishElement = el;
    setTimeout(() => el.classList.add('active'), 10);
    wishAnimationTimer = setTimeout(clearAllWishes, 2500);
  }

  function initPhotos() {
    const safeTop = getSafeAreaInset('top');
    const safeLeft = getSafeAreaInset('left');
    const safeRight = getSafeAreaInset('right');
    const safeBottom = getSafeAreaInset('bottom');
    const shapeClasses = ['shape-1','shape-2','shape-3','shape-4','shape-5','shape-6'];
    const containerW = window.innerWidth - safeLeft - safeRight - 50;
    const containerH = window.innerHeight - safeTop - safeBottom - 50;
    const gridCols = 4, gridRows = 4;
    const cellW = containerW / gridCols, cellH = containerH / gridRows;
    const usedCells = new Set();

    photoSources.forEach((src, index) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.classList.add(shapeClasses[Math.floor(Math.random() * shapeClasses.length)]);
      const size = window.innerWidth < 768 ? 140 : 240;
      const w = size + Math.random() * 40;
      const h = size + Math.random() * 50;

      let cellX, cellY, cellKey;
      do {
        cellX = Math.floor(Math.random() * gridCols);
        cellY = Math.floor(Math.random() * gridRows);
        cellKey = `${cellX}-${cellY}`;
      } while (usedCells.has(cellKey) && usedCells.size < gridCols * gridRows);
      usedCells.add(cellKey);

      const x = safeLeft + cellX * cellW + Math.random() * (cellW - w);
      const y = safeTop + cellY * cellH + Math.random() * (cellH - h);

      card.style.width = w + 'px';
      card.style.height = h + 'px';
      card.style.left = x + 'px';
      card.style.top = y + 'px';
      card.style.zIndex = 20 + Math.floor(Math.random() * 8);
      const rz = Math.random() * 25 - 12.5;
      card.style.transform = `rotateZ(${rz}deg)`;

      const img = document.createElement('img');
      img.src = src;
      img.className = 'photo-img';
      img.onerror = () => img.src = `https://picsum.photos/seed/mmj${index}/400/500`;
      card.addEventListener('click', () => openPhotoViewer(src));
      card.appendChild(img);
      photosContainer.appendChild(card);

      setTimeout(() => {
        card.style.opacity = 0;
        card.style.transform += ' translate(40px,40px) scale(0.5)';
        setTimeout(() => {
          card.style.transition = 'all 1s ease';
          card.style.opacity = 0.95;
          card.style.transform = `rotateZ(${rz}deg)`;
        }, 50);
      }, index * 100);
    });
  }

  function openPhotoViewer(src) {
    photoViewerImg.src = src;
    photoViewer.classList.add('active');
    photosContainer.classList.add('has-active-card');
    footerMessage.classList.add('hidden');
    showRandomWish();
    const flash = document.createElement('div');
    flash.className = 'flash-effect';
    document.body.appendChild(flash);
    flash.onanimationend = () => flash.remove();
  }

  function closePhotoViewer(e) {
    if (e?.target === photoViewerImg) return;
    photoViewer.classList.remove('active');
    photosContainer.classList.remove('has-active-card');
    footerMessage.classList.remove('hidden');
    clearAllWishes();
  }

  class Particle {
    constructor(x, y, c) {
      this.x = x; this.y = y;
      this.vx = Math.random() * 6 - 3;
      this.vy = Math.random() * 6 - 3;
      this.a = 1; this.c = c;
      this.s = Math.random() * 2 + 1;
    }
    update() {
      this.vy += 0.05;
      this.x += this.vx;
      this.y += this.vy;
      this.a -= 0.01;
    }
    draw() {
      ctx.globalAlpha = this.a;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
      ctx.fillStyle = this.c;
      ctx.fill();
    }
  }

  function createClickFirework(x, y) {
    const colors = ['#ff66c4','#ff9dff','#8c52ff','#a855f7','#ff5e8f','#ffd166'];
    const c = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 60; i++) particles.push(new Particle(x, y, c));
  }

  function openMain() {
    document.querySelector('.intro-page').classList.add('hidden');
    document.querySelector('.main-page').classList.add('show');
    setTimeout(() => {
      initFireworks();
      initPhotos();
      initCursorTrail();
      document.querySelector('.main-page').onclick = (e) => {
        if (!photoViewer.classList.contains('active')) createClickFirework(e.clientX, e.clientY);
      };
    }, 300);
  }

  function initCursorTrail() {
    const c = document.getElementById('cursorTrail');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    window.onresize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };

    class TParticle {
      constructor(x, y) { this.x = x; this.y = y; this.s = Math.random() * 2 + 1; this.a = 1; this.d = 0.02; }
      update() { this.a -= this.d; }
      draw() { ctx.globalAlpha = this.a; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); }
    }

    let ps = [];
    window.onmousemove = (e) => { if (Math.random() > 0.5) ps.push(new TParticle(e.clientX, e.clientY)); };
    (function f() {
      requestAnimationFrame(f);
      ctx.clearRect(0, 0, c.width, c.height);
      ps = ps.filter(p => { p.update(); p.draw(); return p.a > 0; });
    })();
  }

  function initIntroStars() {
    const c = document.getElementById('intro-stars');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    window.onresize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };

    class Star {
      constructor() { this.x = Math.random() * c.width; this.y = Math.random() * c.height; this.s = Math.random() + 0.5; this.a = Math.random() + 0.5; }
      update() { this.a = 0.5 + Math.sin(Date.now() / 500) * 0.5; }
      draw() { ctx.globalAlpha = this.a; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); }
    }

    let ss = Array(150).fill().map(() => new Star());
    (function f() {
      requestAnimationFrame(f);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(0, 0, c.width, c.height);
      ss.forEach(s => { s.update(); s.draw(); });
    })();
  }

  function initFireworks() {
    const c = document.getElementById('fireworks');
    window.ctx = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    window.onresize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
    let t = 0;
    (function f() {
      requestAnimationFrame(f);
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(0, 0, c.width, c.height);
      if (Date.now() - t > 600) {
        createClickFirework(Math.random() * c.width, Math.random() * c.height * 0.7);
        t = Date.now();
      }
      particles = particles.filter(p => { p.update(); p.draw(); return p.a > 0; });
    })();
  }

  window.onload = () => { initIntroStars(); };
  document.onkeydown = (e) => e.key === 'Escape' && closePhotoViewer();
</script>
</body>
